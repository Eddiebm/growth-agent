services:
  - type: web
    name: growth-agent-crm
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: npm install
    startCommand: npx tsx apps/api/src/server.ts
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: MOCK_INTEGRATIONS
        value: "true"
      - key: CRON_ENABLED
        value: "true"
      - key: NODE_ENV
        value: production
      - key: DEFAULT_CAMPAIGN_ID
        value: "11111111-1111-1111-1111-111111111111"
